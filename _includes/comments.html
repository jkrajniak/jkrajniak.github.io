{%- if site.comments.giscus and page.comments != false -%}
<section class="post-comments">
  <div class="comments-header">
    <h2 class="comments-title">Discussion</h2>
    <p class="comments-subtitle">Share your thoughts via GitHub Discussions</p>
  </div>
  <div class="giscus-wrapper">
    <script src="https://giscus.app/client.js"
      data-repo="{{ site.comments.giscus.repo }}"
      data-repo-id="{{ site.comments.giscus.repo_id }}"
      data-category="{{ site.comments.giscus.category }}"
      data-category-id="{{ site.comments.giscus.category_id }}"
      data-mapping="{{ site.comments.giscus.mapping | default: 'pathname' }}"
      data-strict="0"
      data-reactions-enabled="{{ site.comments.giscus.reactions_enabled | default: '1' }}"
      data-emit-metadata="0"
      data-input-position="{{ site.comments.giscus.input_position | default: 'top' }}"
      data-theme="preferred_color_scheme"
      data-lang="{{ site.comments.giscus.lang | default: 'en' }}"
      data-loading="lazy"
      crossorigin="anonymous"
      async>
    </script>
  </div>
</section>
{%- endif -%}
